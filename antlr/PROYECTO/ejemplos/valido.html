<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de contacto</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body>
    <header>
        <h1>Formulario de contacto</h1>
    </header>

    <template id="plantilla-tarjeta">
        <div class="tarjeta"></div>
    </template>

    <form action="/contacto" method="POST">
        <input type="hidden" name="csrf_token" value="a1b2c3d4">

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required minlength="2">

        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo" required>

        <label for="clave">Contrasena</label>
        <input type="password" id="clave" name="clave" autocomplete="new-password" required>

        <button type="submit">Enviar</button>
    </form>

    <p>
        Mas informacion en
        <a href="https://example.com/ayuda" target="_blank" rel="noopener noreferrer">nuestra ayuda</a>.
    </p>

    <img src="logo.png" alt="Logotipo">
    <br>
    <hr>
</body>
</html>
